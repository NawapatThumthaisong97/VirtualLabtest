# 03-skypilot/task-aws-burst.yaml
# ─────────────────────────────────────────────────────────────────────────────
# POC Test B: Force AWS Spot only (cloud burst branch)
#
# ทดสอบว่า:
#   1. Spot worker ไม่มี Public IP (Constraint #4)
#   2. S3 เข้าถึงได้ผ่าน VPC Gateway Endpoint (Constraint #7)
#   3. Spot worker เข้าถึงได้ผ่าน Tailscale → t4g.nano → private IP (Constraint #5)
#
# Usage:
#   source ~/skypilot-venv/bin/activate
#   sky launch 03-skypilot/task-aws-burst.yaml \
#     --env S3_BUCKET=virtuallab-ml-artifacts \
#     --cluster vlab-aws-test
# ─────────────────────────────────────────────────────────────────────────────

name: vlab-aws-burst

envs:
  JOB_ID: "aws-burst-001"
  S3_BUCKET: "virtuallab-ml-artifacts"   # override with --env S3_BUCKET=...

run: |
  echo "════════════════════════════════════════════════════════"
  echo "  VirtualLab — AWS Spot Burst Test (POC Branch B)"
  echo "════════════════════════════════════════════════════════"
  echo ""
  echo "   Job ID      : $JOB_ID"
  echo "   Hostname    : $(hostname)"
  echo "   Private IP  : $(hostname -I | awk '{print $1}')"

  # ── Constraint #4: No Public IP ──────────────────────────────────────────
  echo ""
  echo "→ Checking for public IP (Constraint #4)..."
  PUBLIC_IP=$(curl -s --max-time 5 https://ifconfig.me 2>/dev/null || echo "NONE")
  if [ "$PUBLIC_IP" = "NONE" ] || [ -z "$PUBLIC_IP" ]; then
    echo "✅ CONSTRAINT #4 PASSED — No public IP on Spot worker"
  else
    echo "❌ CONSTRAINT #4 FAILED — Unexpected public IP: $PUBLIC_IP"
    exit 1
  fi

  # ── Confirm running on AWS EC2 ────────────────────────────────────────────
  echo ""
  echo "→ Confirming AWS EC2 instance..."
  INSTANCE_ID=$(curl -s --max-time 3 http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo "")
  AZ=$(curl -s --max-time 3 http://169.254.169.254/latest/meta-data/placement/availability-zone 2>/dev/null || echo "")
  INSTANCE_TYPE=$(curl -s --max-time 3 http://169.254.169.254/latest/meta-data/instance-type 2>/dev/null || echo "")
  echo "   Instance ID   : ${INSTANCE_ID:-unknown}"
  echo "   Instance Type : ${INSTANCE_TYPE:-unknown}"
  echo "   AZ            : ${AZ:-unknown}"

  # ── Constraint #7: S3 access via VPC Endpoint ────────────────────────────
  echo ""
  echo "→ Testing S3 access via VPC Gateway Endpoint (Constraint #7)..."
  if aws s3 ls "s3://${S3_BUCKET}/" >/dev/null 2>&1; then
    echo "✅ CONSTRAINT #7 PASSED — S3 accessible (via VPC Endpoint, not internet)"
  else
    echo "❌ S3 access FAILED — check VPC S3 Gateway Endpoint configuration"
    exit 1
  fi

  # ── Simulate ML workload ──────────────────────────────────────────────────
  echo ""
  echo "→ Simulating ML workload..."
  python3 -c "
import time, math
for i in range(10):
    _ = [math.sqrt(x) for x in range(5_000_000)]
    print(f'  Epoch {i+1:2d}/10 — loss: {1.0/(i+1):.4f}')
    time.sleep(1)
print('✅ Workload complete')
"

  # ── Write result to S3 ────────────────────────────────────────────────────
  echo ""
  echo "→ Writing result to S3..."
  cat <<RESULT | aws s3 cp - "s3://${S3_BUCKET}/poc-results/aws-burst/${JOB_ID}.txt"
AWS Burst Test Result
=====================
Job ID      : $JOB_ID
Completed   : $(date -u +%Y-%m-%dT%H:%M:%SZ)
Instance ID : ${INSTANCE_ID:-unknown}
Instance Type: ${INSTANCE_TYPE:-unknown}
AZ          : ${AZ:-unknown}
Private IP  : $(hostname -I | awk '{print $1}')
Public IP   : NONE (Constraint #4 enforced)
S3 Access   : OK via VPC Gateway Endpoint (Constraint #7)
RESULT
  echo "✅ Result written: s3://${S3_BUCKET}/poc-results/aws-burst/${JOB_ID}.txt"

  echo ""
  echo "════════════════════════════════════════════════════════"
  echo "✅ AWS Burst Test PASSED — All constraints verified"
  echo "════════════════════════════════════════════════════════"

# ── Force AWS Spot ONLY — no K3s ─────────────────────────────────────────────
resources:
  - cloud: aws
    region: ap-southeast-1
    instance_type: m7g.medium   # ARM (Graviton) — cheap, fast for smoke test
    use_spot: true
    # Private subnet + no public IP enforced via ~/.sky/config.yaml

autostop:
  idle_minutes: 5   # Auto-terminate after job completes
