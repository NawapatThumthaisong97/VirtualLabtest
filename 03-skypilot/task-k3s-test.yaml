# 03-skypilot/task-k3s-test.yaml
# ─────────────────────────────────────────────────────────────────────────────
# POC Test A: Force K3s only (on-prem branch)
#
# ทดสอบว่า SkyPilot สามารถ dispatch งานไปที่ K3s worker บน on-prem ได้
# ไม่มี AWS fallback ใน task นี้
#
# Usage:
#   source ~/skypilot-venv/bin/activate
#   sky launch 03-skypilot/task-k3s-test.yaml --cluster vlab-k3s-test
# ─────────────────────────────────────────────────────────────────────────────

name: vlab-k3s-test

envs:
  JOB_ID: "k3s-test-001"
  S3_BUCKET: ""   # overridden at launch via --env S3_BUCKET=<bucket>

run: |
  echo "════════════════════════════════════════════════════════"
  echo "  VirtualLab — K3s Branch Test (POC Branch A)"
  echo "════════════════════════════════════════════════════════"
  echo ""
  echo "✅ Running on K3s (on-prem)"
  echo "   Job ID    : $JOB_ID"
  echo "   Hostname  : $(hostname)"
  echo "   Node IP   : $(hostname -I | awk '{print $1}')"
  echo "   Date/Time : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
  echo ""

  # Confirm we are on K3s (not AWS)
  if curl -s --max-time 3 http://169.254.169.254/latest/meta-data/instance-id >/dev/null 2>&1; then
    echo "❌ ERROR: Running on AWS! Expected K3s."
    exit 1
  else
    echo "✅ CONFIRMED: Not on AWS EC2 (as expected for K3s branch)"
  fi

  # Simulate a simple workload
  echo ""
  echo "→ Simulating workload (10 epochs)..."
  python3 -c "
import time, math
for i in range(10):
    _ = [math.sqrt(x) for x in range(1_000_000)]
    print(f'  Epoch {i+1:2d}/10 — loss: {1.0/(i+1):.4f}')
    time.sleep(0.5)
print('✅ Workload complete')
"

  # S3 write test (validate K3s worker can reach S3 via IAM credentials)
  if [ -n "$S3_BUCKET" ]; then
    echo ""
    echo "→ Writing result to S3..."
    echo "K3s test $JOB_ID completed at $(date -u)" | \
      aws s3 cp - "s3://${S3_BUCKET}/poc-results/k3s-test/${JOB_ID}.txt"
    echo "✅ S3 write OK: s3://${S3_BUCKET}/poc-results/k3s-test/${JOB_ID}.txt"
  fi

  echo ""
  echo "════════════════════════════════════════════════════════"
  echo "✅ K3s Branch Test PASSED"
  echo "════════════════════════════════════════════════════════"

# ── Force Kubernetes (K3s) only — NO AWS fallback ────────────────────────────
resources:
  - cloud: kubernetes
    kubernetes:
      networking: portforward
