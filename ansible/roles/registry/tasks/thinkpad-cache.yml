---
# ThinkPad เป็น camp registry — เก็บ image ที่เตรียมไว้ให้เด็กดึง
# รัน: ansible-playbook thinkpad-cache.yml -K

- name: ThinkPad as camp registry
  hosts: localhost
  connection: local
  become: true
  vars:
    cache_root: /srv
  tasks:
    - name: Ensure docker SDK for Ansible
      ansible.builtin.apt:
        name: python3-docker
        state: present
        update_cache: true

    - name: Camp private registry (port 5001)
      community.docker.docker_container:
        name: camp-registry
        image: registry:2
        restart_policy: always
        published_ports: ["5001:5001"]
        env:
          REGISTRY_HTTP_ADDR: "0.0.0.0:5001"
          REGISTRY_STORAGE_DELETE_ENABLED: "true"
        volumes:
          - "{{ cache_root }}/camp-registry:/var/lib/registry"