- name: Get registry-host IP from inventory
  ansible.builtin.set_fact:
    registry_ip: "{{ hostvars[groups['registry'][0]]['ansible_host'] }}"

# master ก็ pull image เองได้ (sky launch ทดสอบ, pod ที่ไม่มี taint กันไว้) ต้องเชื่อ registry
# แบบ HTTP เหมือนกับ worker - เขียนไว้ก่อนติดตั้ง k3s ให้มีผลตั้งแต่ครั้งแรกที่ server เริ่มรัน
- name: Ensure /etc/rancher/k3s directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Configure containerd to trust the private registry as insecure
  ansible.builtin.copy:
    content: |
      mirrors:
        "{{ registry_ip }}:5001":
          endpoint:
            - "http://{{ registry_ip }}:5001"
      configs:
        "{{ registry_ip }}:5001":
          tls:
            insecure_skip_verify: true
    dest: /etc/rancher/k3s/registries.yaml
  register: registries_yaml

- name: Restart k3s to apply registries.yaml (ถ้า config เปลี่ยนและ k3s ติดตั้งไปแล้ว)
  ansible.builtin.systemd:
    name: k3s
    state: restarted
  when: registries_yaml.changed
  ignore_errors: true # ครั้งแรกสุด service ยังไม่มี ก็ข้ามไป (server จะอ่านไฟล์นี้ตอนติดตั้งเองอยู่แล้ว)

- name: Install K3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION={{ k3s_version }} sh -s - server \
      --tls-san {{ ansible_host }} \
      --node-ip {{ ansible_host }} \
      --flannel-iface {{ flannel_iface }} \
      --cluster-cidr {{ k3s_cluster_cidr }} \
      --service-cidr {{ k3s_service_cidr }} \
      --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s

- name: Wait for K3s API to be ready
  ansible.builtin.command: k3s kubectl get --raw /readyz
  register: k3s_ready
  until: k3s_ready.rc == 0
  retries: 12
  delay: 10

- name: Ensure node is Ready
  ansible.builtin.command: >-
    k3s kubectl wait --for=condition=Ready node --all --timeout=120s

- name: Fetch kubeconfig to local machine
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ./artifacts/kubeconfig
    flat: yes

- name: Fetch node token (ไว้ให้ workers join เฟสหน้า)
  ansible.builtin.fetch:
    src: /var/lib/rancher/k3s/server/node-token
    dest: ./artifacts/node-token
    flat: yes