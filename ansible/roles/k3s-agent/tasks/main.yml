---
- name: Read node token from artifacts
  ansible.builtin.set_fact:
    k3s_token: "{{ lookup('file', playbook_dir + '/artifacts/node-token') }}"

- name: Get master node IP from inventory
  ansible.builtin.set_fact:
    k3s_master_ip: "{{ hostvars[groups['master'][0]]['ansible_host'] }}"

- name: Get registry-host IP from inventory
  ansible.builtin.set_fact:
    registry_ip: "{{ hostvars[groups['registry'][0]]['ansible_host'] }}"

# containerd ของ worker ต้องรู้ว่า registry เป็น HTTP ธรรมดา (ไม่มี TLS) ไม่งั้น pod ที่ SkyPilot/
# k8s สั่ง schedule มาลงเครื่องนี้จะดึง image ไม่ได้เลย 
- name: Ensure /etc/rancher/k3s directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Configure containerd to trust the private registry as insecure
  ansible.builtin.copy:
    content: |
      mirrors:
        "{{ registry_ip }}:5001":
          endpoint:
            - "http://{{ registry_ip }}:5001"
      configs:
        "{{ registry_ip }}:5001":
          tls:
            insecure_skip_verify: true
    dest: /etc/rancher/k3s/registries.yaml
  register: registries_yaml

- name: Restart k3s-agent to apply registries.yaml (ถ้า config เปลี่ยนและ agent ติดตั้งไปแล้ว)
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
  when: registries_yaml.changed
  ignore_errors: true # ครั้งแรกสุด service ยังไม่มี ก็ข้ามไป (agent จะอ่านไฟล์นี้ตอนติดตั้งเองอยู่แล้ว)

- name: Install K3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION={{ k3s_version }} \
      K3S_URL=https://{{ k3s_master_ip }}:{{ k3s_api_port }} \
      K3S_TOKEN={{ k3s_token }} \
      sh -s - agent \
      --node-ip {{ ansible_host }} \
      --flannel-iface {{ flannel_iface }}
  args:
    creates: /usr/local/bin/k3s-agent

#เช็กว่า host status ขึ้น ready หรือยัง
- name: Check current Ready status of this node in the cluster
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    k3s kubectl get nodes -o wide --no-headers | awk -v ip="{{ ansible_host }}" '$6==ip {print $2}'
  delegate_to: "{{ groups['master'][0] }}"
  vars:
    ansible_become: false
  changed_when: false
  register: node_status


- name: Wait for node to be ready (ข้ามถ้า Ready อยู่แล้ว)
  ansible.builtin.shell: |
    for i in {1..30}; do
      STATUS=$(k3s kubectl get nodes -o wide --no-headers | awk -v ip="{{ ansible_host }}" '$6==ip {print $2}')
      [ "$STATUS" = "Ready" ] && exit 0
      sleep 5
    done
    exit 1
  delegate_to: "{{ groups['master'][0] }}"
  vars:
    ansible_become: false  #อํานาจเยอะกว่า become=false!
  when: node_status.stdout != "Ready"
  retries: 3
  delay: 10
  register: node_ready
  until: node_ready.rc == 0
