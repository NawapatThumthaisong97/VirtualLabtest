################################################################################
# templates/fastapi/serviceaccount.yaml
# CONSTRAINT #8 Part B: K3s RBAC access via ServiceAccount (no kubeconfig)
################################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ailab-fastapi-sa
  namespace: {{ .Values.namespace }}

---
################################################################################
# ClusterRole: permissions SkyPilot needs to manage K3s local workers
################################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ailab-skypilot-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "pods/log", "pods/exec", "services", "endpoints"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ailab-fastapi-crb
subjects:
  - kind: ServiceAccount
    name: ailab-fastapi-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: ailab-skypilot-role
  apiGroup: rbac.authorization.k8s.io
