################################################################################
# templates/fastapi/configmap.yaml
#
# Non-sensitive configuration for the FastAPI pod.
# Sensitive values (AWS keys, passwords) are in Secrets — NOT here.
#
# Dynamic values (from credentials.env via helm --set):
#   AWS_DEFAULT_REGION ← $AWS_DEFAULT_REGION
#   S3_BUCKET          ← $ML_BUCKET_NAME
#   DATABASE_URL       ← built from $POSTGRES_USER/$POSTGRES_PASSWORD/$POSTGRES_DB
################################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: {{ .Values.namespace }}
data:
  # AWS region (non-sensitive — safe in ConfigMap)
  AWS_DEFAULT_REGION: {{ .Values.global.aws.region | quote }}

  # S3 bucket name (non-sensitive)
  S3_BUCKET: {{ .Values.global.aws.mlBucketName | quote }}

  # Database connection URL
  # Password comes from postgresql.password (set via --set from $POSTGRES_PASSWORD)
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgresql.user }}:{{ .Values.postgresql.password }}@postgresql:5432/{{ .Values.postgresql.database }}"

  # SkyPilot config file path
  SKY_CONFIG_PATH: {{ .Values.fastapi.skyConfigPath | quote }}

  # Application domain (used for CORS, redirect URIs)
  APP_DOMAIN: {{ .Values.global.domain | quote }}

---
################################################################################
# SkyPilot sky_config.yaml ConfigMap
# Dynamic values (subnet ID, SG ID) injected from Terraform outputs
################################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: sky-config
  namespace: {{ .Values.namespace }}
data:
  config.yaml: |
    aws:
      vpc_name: ailab-vpc
      # CONSTRAINT #4: Workers land in private subnet (no public IP)
      # Value: from `terraform output -raw private_subnet_id` → --set global.aws.privateSubnetId
      subnets:
        - {{ .Values.global.aws.privateSubnetId }}
      security_groups:
        - {{ .Values.global.aws.sgSpotWorkersId }}
      use_internal_ips: true
      ssh_proxy_command: null

    kubernetes:
      networking: portforward

    log_dir: /tmp/sky_logs
