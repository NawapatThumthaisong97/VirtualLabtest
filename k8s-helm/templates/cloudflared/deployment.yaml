################################################################################
# templates/cloudflared/deployment.yaml
#
# CONSTRAINT #1: Cloudflare Tunnel initiates OUTBOUND connection — zero inbound ports.
#
# Dynamic values (from credentials.env via helm --set):
#   CLOUDFLARE_TUNNEL_TOKEN ← $CLOUDFLARE_TUNNEL_TOKEN → stored in Secret "cloudflared-token"
################################################################################
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # Token from credentials.env $CLOUDFLARE_TUNNEL_TOKEN → --set global.cloudflare.tunnelToken
  TUNNEL_TOKEN: {{ .Values.global.cloudflare.tunnelToken | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: {{ .Values.namespace }}
  labels:
    app: cloudflared
    project: virtuallab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.6.1  # Pinned — update intentionally
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: TUNNEL_TOKEN
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
