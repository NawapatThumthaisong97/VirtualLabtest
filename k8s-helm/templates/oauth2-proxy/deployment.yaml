################################################################################
# templates/oauth2-proxy/deployment.yaml
#
# Google SSO guard — sits in front of all traffic.
#
# Dynamic values (from credentials.env via helm --set):
#   GOOGLE_CLIENT_ID     ← $GOOGLE_CLIENT_ID     → --set global.oauth2.clientId
#   GOOGLE_CLIENT_SECRET ← $GOOGLE_CLIENT_SECRET  → --set global.oauth2.clientSecret
#   COOKIE_SECRET        ← $OAUTH2_COOKIE_SECRET  → --set global.oauth2.cookieSecret
################################################################################
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: {{ .Values.global.oauth2.clientId | quote }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ .Values.global.oauth2.clientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ .Values.global.oauth2.cookieSecret | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: {{ .Values.namespace }}
  labels:
    app: oauth2-proxy
    project: ailab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=google
            - --upstream=http://fastapi:{{ .Values.fastapi.port }}
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://{{ .Values.global.domain }}/oauth2/callback
            - --email-domain=*
            - --cookie-secure=true
          envFrom:
            - secretRef:
                name: oauth2-proxy-secrets
          ports:
            - containerPort: 4180
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
