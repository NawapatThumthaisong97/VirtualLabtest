################################################################################
# k8s-helm/values.yaml
#
# Master values file for the AI Learner Lab Helm chart.
# ALL dynamic values (credentials, IDs, domains) are pulled from credentials.env
# and injected via Helm --set flags in the deploy command below.
#
# Deploy command (run from repo root after sourcing credentials.env):
#
#   source credentials.env
#   helm upgrade --install virtuallab ./k8s-helm \
#     --namespace virtuallab --create-namespace \
#     --set global.cloudflare.tunnelToken="$CLOUDFLARE_TUNNEL_TOKEN" \
#     --set global.domain="$CLOUDFLARE_TUNNEL_DOMAIN" \
#     --set global.aws.privateSubnetId="$(terraform -chdir=infrastructure/terraform output -raw private_subnet_id)" \
#     --set global.aws.sgSpotWorkersId="$(terraform -chdir=infrastructure/terraform output -raw sg_spot_workers_id)" \
#     --set global.aws.region="$AWS_DEFAULT_REGION" \
#     --set global.aws.mlBucketName="$ML_BUCKET_NAME" \
#     --set global.oauth2.clientId="$GOOGLE_CLIENT_ID" \
#     --set global.oauth2.clientSecret="$GOOGLE_CLIENT_SECRET" \
#     --set global.oauth2.cookieSecret="$OAUTH2_COOKIE_SECRET" \
#     --set postgresql.password="$POSTGRES_PASSWORD" \
#     --set tailscale.authKey="$TAILSCALE_AUTH_KEY" \
#     --set tailscale.onPremCidr="$K3S_MASTER_IP/24"
#
################################################################################

global:
  # ── AWS ──────────────────────────────────────────────────────────────────────
  aws:
    region: "ap-southeast-1"       # Overridden by --set from $AWS_DEFAULT_REGION
    privateSubnetId: ""            # REQUIRED: from `terraform output -raw private_subnet_id`
    sgSpotWorkersId: ""            # REQUIRED: from `terraform output -raw sg_spot_workers_id`
    mlBucketName: "virtuallab-ml-artifacts"   # Overridden by --set from $ML_BUCKET_NAME

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  cloudflare:
    tunnelToken: ""                # REQUIRED: from $CLOUDFLARE_TUNNEL_TOKEN (never committed)

  # ── Google OAuth2 ────────────────────────────────────────────────────────────
  oauth2:
    clientId: ""                   # REQUIRED: from $GOOGLE_CLIENT_ID
    clientSecret: ""               # REQUIRED: from $GOOGLE_CLIENT_SECRET
    cookieSecret: ""               # REQUIRED: from $OAUTH2_COOKIE_SECRET

  # ── Application domain ───────────────────────────────────────────────────────
  # REQUIRED: from $CLOUDFLARE_TUNNEL_DOMAIN — must match your Cloudflare public hostname
  # Used for OAuth2 redirect URL: https://<domain>/oauth2/callback
  domain: ""                       # e.g. virtuallab.yourdomain.com

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  user: "virtuallab"
  password: ""                     # REQUIRED: from $POSTGRES_PASSWORD
  database: "virtuallab_db"
  storageSize: "5Gi"
  image: "postgres:16.3-alpine3.20"  # Pinned — update intentionally

# ── FastAPI Backend ───────────────────────────────────────────────────────────
fastapi:
  image: "your-docker-hub/virtuallab-fastapi:latest"   # Push your image here
  replicas: 1
  port: 8000
  skyConfigPath: "/app/sky_tasks/sky_config.yaml"

# ── Frontend ─────────────────────────────────────────────────────────────────
frontend:
  image: "your-docker-hub/virtuallab-frontend:latest"
  replicas: 1
  port: 3000

# ── Tailscale On-Prem Router ──────────────────────────────────────────────────
tailscale:
  authKey: ""                      # REQUIRED: from $TAILSCALE_AUTH_KEY
  onPremCidr: "192.168.0.0/24"    # On-prem subnet to advertise (NOT the AWS VPC CIDR)
  image: "tailscale/tailscale:v1.68.2"  # Pinned — update intentionally

# ── Namespace ─────────────────────────────────────────────────────────────────
namespace: "virtuallab"
