server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # reverse-proxy to the API/server container - same-origin from the browser's
    # perspective, so the built JS can keep using relative /api and /stream paths
    # unchanged between dev (Vite proxy) and prod (this nginx proxy).
    # NOTE: "music-lab-server" is the hostname this container resolves on the shared
    # Docker network - the server container must be started with --name music-lab-server
    # (or --network-alias music-lab-server) for this to resolve.
    location /api/ {
        proxy_pass http://music-lab-server:8080;
        proxy_set_header Host $host;
    }

    location /stream/ {
        proxy_pass http://music-lab-server:8080;
        proxy_set_header Host $host;
    }
}
