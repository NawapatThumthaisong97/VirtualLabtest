# sky_tasks/burst_test.yaml
# ─────────────────────────────────────────────────────────────────────────────
# SkyPilot FORCE-AWS Task — Bullet 3B Validation Only
#
# Purpose: Bypass K3s Tier 1 entirely and force SkyPilot straight to AWS Spot.
# Used to validate Bullet 3B: "secure AWS burst with no Public IP + no Tailscale
# on Spot worker".
#
# ⚠️  DO NOT use this in normal production job dispatch.
#     For normal jobs, use ml_job.yaml (2-tier spec).
#
# How to trigger via API:
#   POST /api/launch  {"job_type": "burst", "config": {"force_cloud": true}}
# ─────────────────────────────────────────────────────────────────────────────

name: ailab-burst-test

envs:
  JOB_ID: ""
  # S3_BUCKET overridden at runtime by skypilot_service.py from $S3_BUCKET env var
  # which comes from fastapi-config ConfigMap → credentials.env $ML_BUCKET_NAME
  S3_BUCKET: ""

run: |
  echo "=== BURST TEST — Bullet 3B Validation ==="
  echo "Worker      : $(hostname)"
  echo "Private IP  : $(hostname -I | awk '{print $1}')"
  echo "Public IP   : $(curl -s --max-time 3 ifconfig.me || echo 'none — GOOD, private subnet confirmed')"
  echo "Job ID      : $JOB_ID"

  # Confirm no public IP (CONSTRAINT #4 validation)
  PUBLIC_IP=$(curl -s --max-time 3 https://ifconfig.me || echo "none")
  if [ "$PUBLIC_IP" = "none" ]; then
    echo "✅ CONSTRAINT #4 PASSED — No Public IP on Spot worker"
  else
    echo "❌ CONSTRAINT #4 FAILED — Unexpected Public IP: $PUBLIC_IP"
    exit 1
  fi

  # Verify S3 access via VPC Gateway Endpoint (CONSTRAINT #7)
  aws s3 ls s3://$S3_BUCKET/ && echo "✅ CONSTRAINT #7 PASSED — S3 accessible via VPC Endpoint" \
    || echo "❌ S3 access failed — check VPC S3 Gateway Endpoint"

  # Simulate a short training workload
  python3 -c "
import time, math
print('Simulating ML workload...')
for i in range(10):
    _ = [math.sqrt(x) for x in range(10_000_000)]
    print(f'  Epoch {i+1}/10 — loss: {1.0/(i+1):.4f}')
    time.sleep(1)
print('Training complete.')
"

  aws s3 cp /dev/stdin \
    s3://$S3_BUCKET/burst-test-results/$JOB_ID.txt \
    <<< "Burst test $JOB_ID completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  echo "=== Burst test $JOB_ID done ==="

# ── Force AWS ONLY — no K3s fallback ────────────────────────────────────────
resources:
  - cloud: aws
    # Region from credentials.env $AWS_DEFAULT_REGION → Helm ConfigMap
    region: ap-southeast-1      # update here if region changes
    instance_type: m7g.medium    # Lightweight ARM instance — cheap for smoke test
    use_spot: true
    # Private Subnet enforced via ~/.sky/config.yaml (AWS_DEFAULT_SUBNET_ID)

autostop:
  idle_minutes: 2    # Terminate quickly after test completes
